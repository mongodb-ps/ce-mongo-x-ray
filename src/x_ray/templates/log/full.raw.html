<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Log Analysis Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        media="(prefers-color-scheme: dark)">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/highlightjs-copy/dist/highlightjs-copy.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 1200px;
            margin: 0 auto 0 300px;
            padding: 45px;
        }

        #outline {
            box-sizing: border-box;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 280px;
            padding: 40px 24px;
            overflow-y: auto;
            background: var(--bgColor-muted, #f6f8fa);
            border-right: 1px solid var(--borderColor-default, #d0d7de);
        }

        #outline>ul {
            padding-left: 20px;
        }

        #outline li {
            list-style: none;
        }

        #outline a {
            color: var(--fgColor-accent, #0969da);
            text-decoration: none;
        }

        #outline a.in-view {
            font-weight: bold;
            text-decoration: underline;
        }

        #outline li.outline-h2 {
            margin-left: 12px;
        }

        #outline li.outline-h3 {
            margin-left: 32px;
        }

        #expand-outline {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 6px 10px;
            background: var(--bgColor-muted, #f6f8fa);
            border: 1px solid var(--borderColor-default, #d0d7de);
            border-radius: 6px;
            text-decoration: none;
        }

        .pie {
            display: inline-block;
            width: 30%;
        }

        .pie50 {
            display: inline-block;
            width: 48%;
        }

        .bar,
        .pie100 {
            display: inline-block;
            width: 100%;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .tooltip::after {
            content: attr(data-tip);
            background: gray;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            top: 100%;
            white-space: nowrap;
            padding: 6px 8px;
            border-radius: 4px;
            border: solid 1px #ccc;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s, transform .15s;
            z-index: 10;
            width: 100%;
            white-space: normal;
            box-sizing: border-box;
        }

        .tooltip:hover::after,
        .tooltip:focus::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .hljs-copy-wrapper {
            position: relative;
        }

        .hljs-copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.6;
            background-color: var(--bgColor-default);
            border: none;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .markdown-body {
                margin: 0 auto;
                padding: 24px 16px;
            }

            #outline {
                display: none;
            }

            #expand-outline {
                display: none !important;
            }
        }
    </style>
</head>

<body class="markdown-body">
    <script type="text/javascript">
        const ROOT_STYLES = getComputedStyle(document.body);
        const FG_COLOR = ROOT_STYLES.getPropertyValue('--fgColor-default').trim() || '#333333';
        const BG_COLOR = ROOT_STYLES.getPropertyValue('--bgColor-default').trim() || '#ffffff';
        Chart.defaults.color = FG_COLOR;
    </script>
    <nav id="outline" aria-label="Report outline">
        <a href="#" id="collapse-outline" aria-label="Collapse report outline">&#x25C0;</a>
        <b>Report Outline</b>
    </nav>
    <a href="#" id="expand-outline" style="display: none" aria-label="Expand report outline">&#x25B6;</a>
    {{ content }}
    <script type="text/javascript">
        MAX_DATA_POINTS = 1024;
        VIEWPORT_WIDTH = 1200;
        MAX_LEGENDS = 15;
        ANIMATION_DURATION = 100;
        ZOOM_OPTIONS = {
            zoom: {
                wheel: {
                    enabled: true,
                    modifierKey: 'ctrl'
                },
                pinch: {
                    enabled: true
                },
                drag: {
                    enabled: true
                },
                mode: 'x'
            },
            pan: {
                enabled: true,
                mode: 'x',
                modifierKey: 'shift'
            },
            limits: {
                x: {
                    min: "original",
                    max: "original"
                }
            }
        };
        data = {};
        charts = [];

        Chart.register(ChartZoom);
        hljs.addPlugin(new CopyButtonPlugin({
            hook: (_, el) => el.textContent
        }));

        function generateRandomColor(alpha = 0.8) {
            const hue = Math.floor(Math.random() * 360);
            const saturation = Math.floor(Math.random() * 30) + 70; // 70-100%
            const lightness = Math.floor(Math.random() * 20) + 50;  // 50-70%
            return `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        }

        function genDefaultLegendLabels(chart) {
            const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
            return original.map((label, index) => {
                const dataset = chart.data.datasets[index];
                const type = dataset.type;
                if (type === 'line') {
                    label.pointStyle = "line";
                    label.lineWidth = 4;
                } else if (type === 'bar' || type === "pie") {
                    label.pointStyle = "rect";
                } else {
                    label.pointStyle = "circle";
                }
                return label;
            });
        }

        const outline = document.getElementById("outline");
        const collapse = document.getElementById("collapse-outline");
        const expand = document.getElementById("expand-outline");
        const headings = Array.from(document.querySelectorAll("h2, h3"));
        const links = [];
        const list = document.createElement("ul");

        headings.forEach((heading) => {
            const item = document.createElement("li");
            const link = document.createElement("a");
            item.classList.add(`outline-${heading.tagName.toLowerCase()}`);
            link.href = `#${heading.id}`;
            link.textContent = heading.textContent;
            item.appendChild(link);
            list.appendChild(item);
            links.push(link);
        });
        outline.appendChild(list);

        function highlightOutline() {
            let current = 0;
            headings.forEach((heading, index) => {
                if (heading.getBoundingClientRect().top <= 80) {
                    current = index;
                }
            });
            links.forEach((link, index) => link.classList.toggle("in-view", index === current));
        }

        collapse.addEventListener("click", (event) => {
            event.preventDefault();
            outline.style.display = "none";
            document.body.style.margin = "0 auto";
            expand.style.display = "inline";
            window.dispatchEvent(new Event("resize"));
        });

        expand.addEventListener("click", (event) => {
            event.preventDefault();
            outline.style.display = "block";
            document.body.style.margin = "0 auto 0 300px";
            expand.style.display = "none";
            window.dispatchEvent(new Event("resize"));
        });

        window.addEventListener("scroll", highlightOutline, { passive: true });
        highlightOutline();

        hljs.highlightAll();
        if (!navigator.clipboard) {
            document.querySelectorAll(".hljs-copy-button").forEach(function (btn) {
                btn.onclick = function () {
                    var code = this.closest(".hljs-copy-wrapper").querySelector("code");
                    if (!code) return;
                    var text = code.textContent || "";
                    var ta = document.createElement("textarea");
                    ta.value = text;
                    ta.style.position = "fixed";
                    ta.style.opacity = "0";
                    document.body.appendChild(ta);
                    ta.select();
                    try {
                        document.execCommand("copy");
                        this.innerHTML = "Copied!";
                        this.dataset.copied = "true";
                        var self = this;
                        setTimeout(function () { self.innerHTML = "Copy"; self.dataset.copied = "false"; }, 2000);
                    } catch (e) { /* ignore */ }
                    document.body.removeChild(ta);
                };
            });
        }
    </script>
</body>

</html>
