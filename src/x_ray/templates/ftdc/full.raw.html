<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FTDC Analysis Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script>
        try { Chart.register(ChartDataLabels); } catch (e) {}
        Chart.defaults.plugins.datalabels = {
            display: function (ctx) {
                return ctx.chart.config.type === "pie" && ctx.dataset.data.length <= 20 ? "auto" : false;
            },
            color: "#333",
            font: { weight: "bold", size: 11 },
            formatter: function (value, ctx) {
                var label = ctx.chart.data.labels[ctx.dataIndex];
                var total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                return label + "\n" + (total > 0 ? (value / total * 100).toFixed(1) : "0.0") + "%";
            }
        };
    </script>
    <script>var charts=[];</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/highlightjs-copy/dist/highlightjs-copy.min.js"></script>
    {{ style }}
</head>

<body class="markdown-body">
    <nav id="outline" aria-label="Report outline">
        <a href="#" id="collapse-outline" aria-label="Collapse report outline">&#x25C0;</a>
        <b>Report Outline</b>
    </nav>
    <a href="#" id="expand-outline" style="display: none" aria-label="Expand report outline">&#x25B6;</a>
    {{ content }}
    {{ script }}
</body>

</html>
